{% extends "base.html" %}
{% block title %}New Cash Sale{% endblock %}
{% block topbar_title %}New Cash Sale{% endblock %}
{% block topbar_actions %}
  <a href="{{ url_for('jobs.index') }}" class="btn-ghost">
    <i class="bi bi-arrow-left"></i> Jobs
  </a>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="sd-card">
      <div class="sd-card-header">
        <i class="bi bi-cash-coin" style="color:var(--sd-accent);"></i>
        Cash Sale
        <span style="font-size:0.75rem; font-weight:400; color:var(--sd-muted);">
          CS-NNNN — Cash Sales customer
        </span>
      </div>
      <form method="post">
        <div style="padding:1.25rem;">
          <div class="row g-3">

            <!-- Sale Date -->
            <div class="col-md-6">
              <label class="sd-label">Sale Date</label>
              <input type="date" name="sale_date" class="sd-input"
                     value="{{ today }}" required>
            </div>

            <!-- Payment Type -->
            <div class="col-md-6">
              <label class="sd-label">Payment Type *</label>
              <div style="display:flex; gap:1rem; padding-top:0.55rem;">
                {% for pt in ['EFTPOS', 'Cash'] %}
                <label style="display:flex; align-items:center; gap:0.4rem;
                              cursor:pointer; font-size:0.875rem;">
                  <input type="radio" name="payment_type" value="{{ pt }}"
                         {% if pt == 'EFTPOS' %}checked{% endif %}
                         style="accent-color:var(--sd-accent); width:15px; height:15px;"
                         required>
                  {{ pt }}
                </label>
                {% endfor %}
              </div>
            </div>

            <!-- Notes -->
            <div class="col-12">
              <label class="sd-label">Notes <span style="color:var(--sd-muted); font-weight:400;">(optional)</span></label>
              <input type="text" name="notes" class="sd-input"
                     placeholder="e.g. Walk-in, regular customer, event…">
            </div>

          </div>
        </div>
        <div style="padding:0.75rem 1.25rem; border-top:1px solid var(--sd-border);
                    display:flex; justify-content:flex-end; gap:0.6rem;">
          <a href="{{ url_for('jobs.index') }}" class="btn-ghost">Cancel</a>
          <button type="submit" class="btn-accent">
            <i class="bi bi-plus-lg"></i> Create Sale &amp; Add Parts
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
