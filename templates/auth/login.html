<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign In — ServiceDesk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --sd-navy: #0f172a; --sd-slate: #1e293b; --sd-border: #334155;
      --sd-accent: #f97316; --sd-text: #e2e8f0; --sd-muted: #94a3b8;
    }
    body { background:var(--sd-navy); color:var(--sd-text); font-family:'Segoe UI',sans-serif;
           min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { background:var(--sd-slate); border:1px solid var(--sd-border);
                  border-radius:10px; padding:2.5rem; width:100%; max-width:400px; }
    .sd-label { display:block; font-size:0.72rem; font-weight:600; color:var(--sd-muted);
                text-transform:uppercase; letter-spacing:.08em; margin-bottom:.4rem; }
    .sd-input { width:100%; background:var(--sd-navy); border:1px solid var(--sd-border);
                color:var(--sd-text); padding:.55rem .75rem; border-radius:6px;
                font-size:1rem; transition:border-color .15s;
                -webkit-appearance:none; min-height:44px; }
    .sd-input:focus { outline:none; border-color:var(--sd-accent);
                      box-shadow:0 0 0 3px rgba(249,115,22,.15); }
    .btn-accent { background:var(--sd-accent); color:#fff; border:none; padding:.65rem 1.25rem;
                  border-radius:6px; font-size:1rem; font-weight:500; width:100%;
                  cursor:pointer; transition:background .15s; min-height:48px; }
    .btn-accent:hover { background:#ea580c; }
    .alert-danger { background:rgba(248,113,113,.12); border:1px solid rgba(248,113,113,.25);
                    color:#f87171; border-radius:6px; padding:.75rem 1rem; font-size:.875rem;
                    margin-bottom:1rem; }
    .logo-wrap { text-align:center; margin-bottom:2rem; }
    .logo-wrap img { max-width:180px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-wrap">
      <img src="{{ url_for('static', filename='img/branding.png') }}" alt="The Flying Bike">
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert-danger">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <div style="margin-bottom:1.25rem;">
        <label class="sd-label">Email</label>
        <input type="email" name="email" class="sd-input" required autofocus
               placeholder="you@example.com"
               value="{{ request.form.get('email','') }}">
      </div>
      <div style="margin-bottom:1.75rem;">
        <label class="sd-label">Password</label>
        <input type="password" name="password" class="sd-input" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-accent">Sign In</button>
    </form>
  </div>
</body>
</html>
