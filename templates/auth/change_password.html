{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block topbar_title %}Change Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-4">
    <div class="sd-card">
      <div class="sd-card-header">Change Password</div>
      <div style="padding:1.5rem;">
        {% if current_user and current_user['must_change_pw'] %}
        <div class="sd-alert sd-alert-danger" style="margin-bottom:1.25rem;">
          <i class="bi bi-exclamation-triangle"></i>
          You must change your password before continuing.
        </div>
        {% endif %}
        <form method="post">
          <div class="row g-3">
            <div class="col-12">
              <label class="sd-label">Current Password</label>
              <input type="password" name="current_password" class="sd-input" required>
            </div>
            <div class="col-12">
              <label class="sd-label">New Password</label>
              <input type="password" name="new_password" class="sd-input" required
                     minlength="8" placeholder="At least 8 characters">
            </div>
            <div class="col-12">
              <label class="sd-label">Confirm New Password</label>
              <input type="password" name="confirm_password" class="sd-input" required>
            </div>
          </div>
          <hr class="divider">
          <button type="submit" class="btn-accent">
            <i class="bi bi-check-lg"></i> Update Password
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
