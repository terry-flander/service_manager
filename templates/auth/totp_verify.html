<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two-Factor Auth — ServiceDesk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --sd-navy:#0f172a; --sd-slate:#1e293b; --sd-border:#334155;
            --sd-accent:#f97316; --sd-text:#e2e8f0; --sd-muted:#94a3b8; }
    body { background:var(--sd-navy); color:var(--sd-text); font-family:'Segoe UI',sans-serif;
           min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:var(--sd-slate); border:1px solid var(--sd-border);
            border-radius:10px; padding:2.5rem; width:100%; max-width:380px; }
    .sd-label { display:block; font-size:.72rem; font-weight:600; color:var(--sd-muted);
                text-transform:uppercase; letter-spacing:.08em; margin-bottom:.4rem; }
    .code-input { width:100%; background:var(--sd-navy); border:1px solid var(--sd-border);
                  color:var(--sd-text); padding:.6rem; border-radius:6px; font-size:1.5rem;
                  text-align:center; letter-spacing:.3em; font-family:monospace;
                  transition:border-color .15s; }
    .code-input:focus { outline:none; border-color:var(--sd-accent);
                        box-shadow:0 0 0 3px rgba(249,115,22,.15); }
    .btn-accent { background:var(--sd-accent); color:#fff; border:none; padding:.55rem 1.25rem;
                  border-radius:6px; font-size:.9rem; font-weight:500; width:100%; cursor:pointer; }
    .btn-accent:hover { background:#ea580c; }
    .alert-danger { background:rgba(248,113,113,.12); border:1px solid rgba(248,113,113,.25);
                    color:#f87171; border-radius:6px; padding:.75rem 1rem; font-size:.875rem;
                    margin-bottom:1rem; }
  </style>
</head>
<body>
  <div class="card">
    <div style="text-align:center; margin-bottom:1.75rem;">
      <div style="font-size:2rem; margin-bottom:.5rem;">🔐</div>
      <h5 style="margin:0; font-weight:600;">Two-Factor Verification</h5>
      <p style="font-size:.85rem; color:var(--sd-muted); margin-top:.4rem;">
        Enter the 6-digit code from your authenticator app
      </p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert-danger">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <div style="margin-bottom:1.5rem;">
        <label class="sd-label">Authenticator Code</label>
        <input type="text" name="code" class="code-input" required
               maxlength="6" inputmode="numeric" pattern="[0-9]{6}"
               autocomplete="one-time-code" autofocus placeholder="000000">
      </div>
      <button type="submit" class="btn-accent">Verify</button>
    </form>

    <div style="text-align:center; margin-top:1.25rem;">
      <a href="{{ url_for('auth.login') }}"
         style="font-size:.82rem; color:var(--sd-muted); text-decoration:none;">
        ← Back to login
      </a>
    </div>
  </div>
</body>
</html>
